version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: links_db
      POSTGRES_USER: links_user
      POSTGRES_PASSWORD: links_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://links_user:links_pass@db:5432/links_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: please-change-in-env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:

